name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    name: Type-check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mypy pydantic pydantic-settings loguru typer rich jinja2 Pillow
      - run: mypy fsvlm --ignore-missing-imports

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e .
      - run: pip install pytest pytest-cov hypothesis
      - run: pytest tests/unit -q --cov=fsvlm --cov-report=term-missing

  import-speed:
    name: Base import <2s
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Ensure `import fsvlm` is torch-free and fast
        run: |
          python -c "
          import time
          t = time.perf_counter()
          import fsvlm
          elapsed = time.perf_counter() - t
          print(f'import fsvlm took {elapsed:.3f}s (version={fsvlm.__version__})')
          assert elapsed < 2.0, f'Base import too slow: {elapsed:.2f}s'
          import sys
          assert 'torch' not in sys.modules, 'torch leaked into base import'
          "

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*

  validate-skills:
    name: Validate skills frontmatter + eval coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/validate_skills.py
      - name: Lint every skills/evals/*.eval.json is parseable
        run: |
          python -c "
          import json, sys
          from pathlib import Path
          bad = []
          for p in sorted(Path('skills/evals').glob('*.eval.json')):
              try:
                  spec = json.loads(p.read_text())
                  assert 'skill' in spec and 'evals' in spec, f'{p}: missing required keys'
                  for ev in spec['evals']:
                      for k in ('eval_id', 'eval_name', 'prompt', 'assertions'):
                          assert k in ev, f'{p}: eval missing {k}'
              except Exception as e:
                  bad.append((str(p), str(e)))
          if bad:
              for p, e in bad:
                  print(f'BAD {p}: {e}', file=sys.stderr)
              sys.exit(1)
          print(f'OK: {len(list(Path(\"skills/evals\").glob(\"*.eval.json\")))} eval files validated')
          "
